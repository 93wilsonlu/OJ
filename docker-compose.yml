services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oj
      POSTGRES_PASSWORD: oj
      POSTGRES_DB: oj
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oj:oj@postgres:5432/oj
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro

  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.worker
  #   environment:
  #     GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
  #     GCS_BUCKET: ${GCS_BUCKET}
  #     GCS_PROJECT: ${GCS_PROJECT}
  #     PUBSUB_JUDGE_TOPIC: ${PUBSUB_JUDGE_TOPIC}
  #     PUBSUB_RUN_TOPIC: ${PUBSUB_RUN_TOPIC}
  #     PUBSUB_JUDGE_SUBSCRIPTION: ${PUBSUB_JUDGE_SUBSCRIPTION}
  #     PUBSUB_RUN_SUBSCRIPTION: ${PUBSUB_RUN_SUBSCRIPTION}
  #     CALLBACK_URL: http://api:8000
  #     INTERNAL_TOKEN: ${INTERNAL_TOKEN}
  #   depends_on:
  #     api:
  #       condition: service_started
  #   volumes:
  #     - ~/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro

  nginx:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
