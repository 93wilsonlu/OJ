name: Deploy to GCE VM

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Package project
        run: |
          tar \
            --exclude="./frontend/node_modules" \
            --exclude="./node_modules" \
            --exclude="./backend/.venv" \
            --exclude="./.git" \
            --exclude="./.env" \
            --exclude="./__pycache__" \
            --exclude="./.pytest_cache" \
            --exclude="./frontend/dist" \
            --exclude="./frontend/build" \
            -czf /tmp/final_deploy.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          printf '%s' "${{ secrets.GCE_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/gce_key
          chmod 600 ~/.ssh/gce_key

          ssh-keygen -y -f ~/.ssh/gce_key > /tmp/gce_key.pub

          ssh-keyscan -H "${{ secrets.GCE_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to VM
        run: |
          scp -i ~/.ssh/gce_key /tmp/final_deploy.tar.gz \
            ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/final_deploy.tar.gz

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/gce_key ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} << 'EOF'
          set -e

          APP_DIR="$HOME/oj"

          mkdir -p "$APP_DIR"

          if [ ! -f "$APP_DIR/.env" ]; then
            echo "ERROR: $APP_DIR/.env not found. Create it on VM first."
            exit 1
          fi

          cp "$APP_DIR/.env" "$HOME/oj.env.backup"

          if ! find "$APP_DIR" -mindepth 1 -maxdepth 1 \
            ! -name ".env" \
            ! -name "secrets" \
            -exec rm -rf {} +; then
            echo "Warning: some files could not be removed due to permissions, but deployment will continue. Check VM file ownership if issues arise."
          fi

          tar -xzf "$HOME/final_deploy.tar.gz" -C "$APP_DIR"
          cp "$HOME/oj.env.backup" "$APP_DIR/.env"

          # Write GCP credentials
          mkdir -p "$APP_DIR/secrets"
          # Some deployments leave adc.json non-writable (e.g. root-owned from prior container writes).
          # In that case keep the existing file so deploy does not fail.
          # If service account keys rotate, fix ownership/permissions and refresh this file manually on the VM.
          if [ -f "$APP_DIR/secrets/adc.json" ] && [ ! -w "$APP_DIR/secrets/adc.json" ]; then
            echo "Keeping existing non-writable $APP_DIR/secrets/adc.json (assumes existing credentials are valid)"
          elif [ -w "$APP_DIR/secrets" ]; then
            cat > "$APP_DIR/secrets/adc.json" << 'CREDS'
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          CREDS
            chmod 600 "$APP_DIR/secrets/adc.json"
          else
            echo "ERROR: $APP_DIR/secrets is not writable and adc.json is missing. Fix VM permissions or create the file manually."
            exit 1
          fi

          cd "$APP_DIR"

          docker compose up -d --build --remove-orphans
          docker compose ps

          echo "Deploy finished."
          EOF
