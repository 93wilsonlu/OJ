name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install system dependencies
        run: sudo apt-get install -y g++ gcc

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build Dockerfile.worker
        working-directory: .
        run: |
          for attempt in 1 2 3; do
            docker build -f backend/Dockerfile.worker -t judge-worker-ci backend/ && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "Docker build failed (attempt $attempt/3), retrying in 15s..."
              sleep 15
            fi
          done
          echo "Docker build failed after 3 attempts."
          exit 1

  frontend:
    name: Frontend (tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

